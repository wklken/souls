<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'zh' }}" data-theme="{{ site.default_theme | default: 'light' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="souls-search-url" content="{{ '/search.json' | relative_url }}">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <style>
    /* 基础样式 - 确保页面不为空 */
    :root {
      --bg-color: #ffffff;
      --bg-secondary: #f5f5f5;
      --text-color: #333333;
      --text-secondary: #666666;
      --border-color: #e0e0e0;
      --accent-color: #2563eb;
      --accent-hover: #1d4ed8;
      --card-bg: #ffffff;
    }
    [data-theme="dark"] {
      --bg-color: #1a1a2e;
      --bg-secondary: #16213e;
      --text-color: #eaeaea;
      --text-secondary: #a0a0a0;
      --border-color: #2d3748;
      --accent-color: #60a5fa;
      --accent-hover: #3b82f6;
      --card-bg: #242444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      line-height: 1.6;
    }
    .wrapper { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    .site-header {
      background-color: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      padding: 1rem 0;
    }
    .site-header .wrapper {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .site-title {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--text-color);
      text-decoration: none;
    }
    .site-nav {
      display: flex;
      gap: 1.5rem;
    }
    .site-nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
    }
    .site-nav a:hover {
      color: var(--accent-color);
    }
    .page-content {
      min-height: 60vh;
      padding: 2rem 0;
    }
    .site-footer {
      background-color: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
      padding: 2rem 0;
      text-align: center;
      color: var(--text-secondary);
    }
    .hero {
      text-align: center;
      padding: 3rem 0;
    }
    .hero-title {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }
    .hero-slogan {
      font-size: 1.5rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }
    .stats-bar {
      color: var(--text-secondary);
      margin-top: 1rem;
    }
    .search-container {
      max-width: 600px;
      margin: 2rem auto;
    }
    .search-box {
      display: flex;
      border: 2px solid var(--border-color);
      border-radius: 8px;
      overflow: hidden;
      background-color: var(--card-bg);
    }
    .search-input {
      flex: 1;
      padding: 1rem;
      border: none;
      background: transparent;
      color: var(--text-color);
      font-size: 1rem;
    }
    .search-input:focus {
      outline: none;
    }
    .search-btn {
      padding: 0 1rem;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
    }
    .category-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
      max-width: 900px;
      margin: 2rem auto;
    }
    .category-card {
      display: block;
      padding: 2rem;
      background-color: var(--card-bg);
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
      color: var(--text-color);
      text-decoration: none;
    }
    .category-card h3 {
      margin-bottom: 0.5rem;
    }
    .category-en {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
  </style>
  {% seo %}
</head>
<body>
  {% include header.html %}
  
  <main class="page-content">
    {{ content }}
  </main>
  
  {% include footer.html %}
  
  <script src="{{ '/assets/js/theme.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/i18n.js' | relative_url }}"></script>
</body>
</html>
