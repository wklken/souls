<!DOCTYPE html>
<html
  lang="{{ page.lang | default: site.lang | default: 'zh' }}"
  data-theme="{{ site.default_theme | default: 'light' }}"
  data-baseurl="{{ site.baseurl | default: '' }}"
  data-site-title="{{ site.title | escape }}"
  data-page-title-zh="{{ page.title_zh | default: page.title | default: site.title | escape }}"
  data-page-title-en="{{ page.title_en | default: page.english_name | default: page.title | default: site.title | escape }}"
>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="souls-search-url" content="{{ '/search.json' | relative_url }}">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% seo %}
  {% include json_ld.html %}
</head>
<body>
  {% include header.html %}
  
  <main class="page-content">
    {{ content }}
  </main>
  
  {% include footer.html %}
  
  <script src="{{ '/assets/js/theme.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/i18n.js' | relative_url }}"></script>
</body>
</html>
