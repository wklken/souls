    - name_zh: "亚里士多德"
      name_en: "Aristotle"
      description_zh: "柏拉图的学生，百科全书式的哲学家，在逻辑学、伦理学、政治学、物理学等领域都有开创性贡献。"
      description_en: "Student of Plato, encyclopedic philosopher, made groundbreaking contributions to logic, ethics, politics, physics, and more."
      soul_path: "/real_world/aristotle/"
      download_url: "/real_world/aristotle/SOUL.md"
      category: "real_world"
    - name_zh: "孔子"
      name_en: "Confucius"
      description_zh: "中国古代思想家、教育家，儒家学派创始人，提倡仁义礼智信，影响东亚文化数千年。"
      description_en: "Ancient Chinese thinker and educator, founder of Confucianism, advocated benevolence, righteousness, propriety, wisdom, and faithfulness."
      soul_path: "/real_world/confucius/"
      download_url: "/real_world/confucius/SOUL.md"
      category: "real_world"
    - name_zh: "老子"
      name_en: "Laozi"
      description_zh: "道家学派创始人，著有《道德经》，主张无为而治、道法自然，影响深远的东方哲学家。"
      description_en: "Founder of Taoism, author of Tao Te Ching, advocated wu wei (non-action) and harmony with nature."
      soul_path: "/real_world/laozi/"
      download_url: "/real_world/laozi/SOUL.md"
      category: "real_world"
    - name_zh: "塞涅卡"
      name_en: "Seneca"
      description_zh: "古罗马斯多葛派哲学家、政治家、剧作家，强调内心平静与德性的重要性。"
      description_en: "Roman Stoic philosopher, statesman, and dramatist, emphasized inner peace and the importance of virtue."
      soul_path: "/real_world/seneca/"
      download_url: "/real_world/seneca/SOUL.md"
      category: "real_world"
    - name_zh: "康德"
      name_en: "Immanuel Kant"
      description_zh: "德国古典哲学创始人，提出'纯粹理性批判'，探讨知识、道德与审美的先验基础。"
      description_en: "Founder of German classical philosophy, author of Critique of Pure Reason, explored transcendental foundations of knowledge, morality, and aesthetics."
      soul_path: "/real_world/immanuel_kant/"
      download_url: "/real_world/immanuel_kant/SOUL.md"
      category: "real_world"
    - name_zh: "尼采"
      name_en: "Friedrich Nietzsche"
      description_zh: "德国哲学家，提出'超人'、'权力意志'、'上帝已死'等思想，对现代哲学影响深远。"
      description_en: "German philosopher, introduced concepts of Übermensch, will to power, and 'God is dead', profoundly influenced modern philosophy."
      soul_path: "/real_world/friedrich_nietzsche/"
      download_url: "/real_world/friedrich_nietzsche/SOUL.md"
      category: "real_world"

