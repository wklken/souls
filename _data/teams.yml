      name_en: "Socrates"
      description_zh: "古希腊哲学家，苏格拉底式诘问法的创始人，主张'认识你自己'，通过不断提问引导人们发现真理。"
      description_en: "Ancient Greek philosopher, founder of the Socratic method, advocated 'Know Thyself', guided people to discover truth through questioning."
