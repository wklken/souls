    - name_zh: "柏拉图"
      name_en: "Plato"
      description_zh: "苏格拉底的学生，西方哲学史上最重要的哲学家之一，提出了理念论和理想国的概念。"
      description_en: "Student of Socrates, one of the most important philosophers in Western history, proposed the Theory of Forms and the concept of the ideal state."
