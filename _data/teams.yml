  description_zh: "汇聚东西方最伟大的哲学家，从古希腊的苏格拉底、柏拉图、亚里士多德，到中国的孔子、老子，再到德国的康德、尼采。让 AI 以哲学家的思维方式与你探讨人生、伦理与真理。"
