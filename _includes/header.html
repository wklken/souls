<header class="site-header">
  <div class="wrapper">
    <a class="site-title" href="{{ '/' | relative_url }}">
        <img
          src="{{ '/assets/favicon/favicon-32x32.png' | relative_url }}"
          alt=""
          width="32"
          height="32"
        >
      <span class="site-title-text" data-i18n="site.title">{{ site.brand_name | default: site.title }}</span>
    </a>
    
    <nav class="site-nav">
      {% for item in site.nav %}
      <a href="{{ item.url | relative_url }}" class="nav-link" data-i18n="nav.{{ item.url | remove: '/' }}">{{ item.title.zh }}</a>
      {% endfor %}
    </nav>
    
    <div class="header-actions">
      {% include language_switcher.html %}
      {% if site.theme_switcher %}
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        <span class="theme-icon light">☀️</span>
        <span class="theme-icon dark">🌙</span>
      </button>
      {% endif %}
    </div>
  </div>
</header>
