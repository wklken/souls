# Souls - 历史人物灵魂库

title: "Agent Souls - AI Character Prompts Library"
brand_name: Souls
email: wklken@gmail.com
description: >-
  一个收录历史人物、经典角色与专家 persona 的 AI 灵魂设定库。
  AI prompts and character prompts library for historical figures, classic characters, and expert personas.
lang: zh-CN
locale: zh_CN

baseurl: "" # 根路径部署时保持空字符串；子目录部署时填写如 "/souls"
url: "https://agent-souls.com" # 站点域名（不带尾部斜杠）
google_analytics: "G-9TBH4ZB6L5"

github_username: wklken
repository: wklken/souls

# Jekyll 配置
# 不使用主题，使用完全自定义布局
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# SASS 配置
sass:
  sass_dir: assets/css
  style: compressed

# 多语言配置
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
      lang: "zh-CN"

# 站点统计
stats:
  real_world: 332
  virtual_world: 4
  personas: 8
  total: 344

# 导航
nav:
  - title:
      zh: "真实世界"
      en: "Real World"
    url: "/real_world"
  - title:
      zh: "非真实世界"
      en: "Virtual World"
    url: "/virtual_world"
  - title:
      zh: "专家角色"
      en: "Personas"
    url: "/personas"
  - title:
      zh: "灵魂团队"
      en: "Teams"
    url: "/teams"

# 搜索配置
search:
  enabled: true
  placeholder:
    zh: "搜索人物..."
    en: "Search souls..."

# 主题配置
theme_switcher: true
default_theme: "light" # light 或 dark

# 排除文件
exclude:
  - scripts/
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md
  - AGENTS.md
  - LICENSE
  - ".gitignore"
  - ".github/"
  - ".claude/"
  - ".agents/"
  - skills
  - TODO_LIST.md
  - _bundle/
  - docs/
